services:
  meetingbot-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app:cached
      - meetingbot_frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_OUTPUT_WEBSOCKET_URL=${OUTPUT_WEBSOCKET_URL}
      - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://localhost:4000}
    depends_on:
      - meetingbot-backend

  meetingbot-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - meetingbot_backend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - OUTPUT_WEBSOCKET_URL=${OUTPUT_WEBSOCKET_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DIGISELF_API_KEY=${DIGISELF_API_KEY}
      - AUDIO_FILE_URL=${AUDIO_FILE_URL}
    restart: unless-stopped

volumes:
  meetingbot_frontend_node_modules:
  meetingbot_backend_node_modules:
